<!DOCTYPE html>
<html>
<head>
    <title>Float Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Float Example</h2>

    <div class="container">
        <img src="1.png" alt="Sample Image">

        <p>
            This is a simple example of float in CSS. The image is floated to the left,
            so this text wraps around it. You can see how the paragraph adjusts itself
            beside the image instead of going below it.
        </p>
    </div>

    <h2>Boxes Side by Side</h2>

    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>

   

</body>
</html>
